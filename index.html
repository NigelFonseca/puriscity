<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buses Puriscal - Horarios</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; flex: 1; }

        h2 { text-align: center; font-weight: 300; letter-spacing: 1px; margin-bottom: 20px; }
        h3 { font-size: 14px; color: var(--text-dim); text-align: center; font-weight: 400; margin-bottom: 25px; line-height: 1.5; }

        .btn-ruta {
            width: 100%;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #333;
            padding: 18px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-ruta:active { transform: scale(0.98); background-color: #222; }
        .btn-ruta span.arrow { color: var(--accent-color); font-weight: bold; font-size: 18px; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-back {
            background: none; border: none; color: var(--accent-color);
            font-size: 14px; margin-bottom: 15px; cursor: pointer;
            display: flex; align-items: center; font-weight: bold;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            border: 1px solid #333; text-align: center;
        }

        .contador {
            font-size: 32px; font-weight: 700; color: var(--accent-color);
            margin: 20px 0; text-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            margin: 20px 0; padding-top: 20px; border-top: 1px solid #333;
        }

        .info-item span { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .info-item b { font-size: 16px; }

        .proximos-container {
            text-align: left; margin-top: 20px; padding: 15px;
            background: #111; border-radius: 10px;
        }

        .hidden { display: none; }

        footer {
            margin-top: 40px; padding: 20px; text-align: center;
            font-size: 13px; color: var(--text-dim); border-top: 1px solid #222; width: 100%;
        }

        footer a { color: var(--accent-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="step1">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="img/logo-puriscity.png" alt="Logo PurisCity" style="max-width: 250px; height: auto;">
        </div>
        <h2>Rutas de Autobús en Puriscal 🚌</h2>
        <h3>Seleccione una ruta para ver el tiempo restante para el próximo autobús:</h3>
        <button class="btn-ruta" onclick="navigateToRoute('guayabo')">Guayabo (Cruce Tabarcia) <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToRoute('palmichal')">Palmichal <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToRoute('jaris')">Jaris <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToRoute('cais')">CAIS <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToRoute('sanantonioabajo')">San Antonio Abajo <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToRoute('sanjose')">San José <span class="arrow">></span></button>
        <button class="btn-ruta btn-disabled" disabled>Mercedes Norte <span>Próximamente</span></button>
        <button class="btn-ruta btn-disabled" disabled>San Rafael <span>Próximamente</span></button>
        <button class="btn-ruta btn-disabled" disabled>Zapatón <span>Próximamente</span></button>
        <button class="btn-ruta btn-disabled" disabled>San Juan <span>Próximamente</span></button>
        <button class="btn-ruta btn-disabled" disabled>Desamparaditos <span>En un futuro...</span></button>
        <button class="btn-ruta btn-disabled" disabled>La Legua <span>En un futuro...</span></button>
        <button class="btn-ruta btn-disabled" disabled>Pozos <span>En un futuro...</span></button>
        <button class="btn-ruta btn-disabled" disabled>Barbacoas <span>En un futuro...</span></button>
    </div>

    <div id="step2" class="hidden">
        <button class="btn-back" onclick="window.history.back()">← VOLVER</button>
        <h2 id="routeTitleDisplay"></h2>
        <button class="btn-ruta" onclick="navigateToDirection(0)"><span id="dirName0"></span> <span class="arrow">></span></button>
        <button class="btn-ruta" onclick="navigateToDirection(1)"><span id="dirName1"></span> <span class="arrow">></span></button>
    </div>

    <div id="step3" class="hidden">
        <button class="btn-back" onclick="window.history.back()">← CAMBIAR DIRECCIÓN</button>
        <div class="card">
            <span id="dayLabel" style="color: var(--accent-color); font-size: 12px; font-weight: bold;"></span>
            <div id="originDisplay" style="margin-top: 5px; font-size: 18px;"></div>
            <div class="contador" id="countdown">--:--</div>
            <div class="info-grid">
                <div class="info-item"><span>Hora Actual</span><b id="currTime">--:--</b></div>
                <div class="info-item"><span>Salida Anterior</span><b id="prevBus">--:--</b></div>
                <div class="info-item"><span>Próxima Salida</span><b id="nextBus">--:--</b></div>
            </div>
            <div class="proximos-container">
                <small style="color:var(--text-dim)">RESTO DEL DÍA:</small>
                <div id="otherTimes" style="margin-top: 8px; font-size: 14px; letter-spacing: 1px;"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    Desarrollado por el <a href="https://www.linkedin.com/in/nayel-fonseca" target="_blank">Ingeniero Nayel Fonseca</a>
</footer>

<script>
    const data = {
        guayabo: {
            name: "Guayabo - Puriscal",
            dirs: ["Puriscal", "Guayabo"],
            h: {
                semana: [["05:00", "07:30", "08:00", "09:30", "10:00", "11:00", "11:30", "12:00", "13:00", "13:30", "14:00", "15:00"], ["05:25", "06:30", "08:00", "08:30", "10:00", "11:00", "11:30", "12:00", "13:00", "13:30", "14:00", "15:00"]],
                sabado: [["07:30", "08:00", "09:30", "10:00", "11:00", "11:30", "12:00", "13:00", "14:00", "15:00", "15:30", "16:30", "18:05"], ["07:30", "08:00", "08:45", "10:00", "11:30", "12:00", "13:00", "13:30", "14:30", "16:00", "17:00", "18:30"]],
                domingo: [["08:00", "10:00", "12:00", "15:00", "17:00"], ["08:30", "11:00", "13:00", "15:30", "17:30"]]
            }
        },
        palmichal: {
            name: "Palmichal - Puriscal",
            dirs: ["Puriscal", "Palmichal"],
            h: {
                semana: [["05:50", "07:00", "09:00", "10:30", "12:30", "14:30", "16:00", "17:00"], ["05:45", "06:30", "07:00", "08:30", "10:00", "12:00", "14:00", "16:00"]],
                sabado: [["07:00", "09:00", "10:30", "12:30", "14:30", "16:00", "17:00"], ["05:55", "06:30", "08:30", "10:00", "12:00", "14:00", "16:00"]],
                domingo: [["11:00", "14:00"], ["07:00", "12:00"]]
            }
        },
        jaris: {
            name: "Jaris - Puriscal",
            dirs: ["Puriscal", "Jaris"],
            h: {
                semana: [["05:30", "06:30", "09:00", "12:30", "15:00", "17:05"], ["06:00", "07:00", "09:30", "13:00", "15:35", "17:35"]],
                sabado: [["07:00", "09:00", "12:30", "16:00"], ["07:30", "09:30", "13:00", "16:30"]],
                domingo: [["09:00", "13:00", "16:00"], ["09:30", "13:30", "16:30"]]
            }
        },
        cais: {
            name: "CAIS - Puriscal",
            dirs: ["Puriscal", "CAIS"],
            h: {
                semana: [["06:45"], ["07:00"]],
                sabado: [["---"], ["---"]],
                domingo:[["---"], ["---"]]
            }
        },
        sanantonioabajo: {
            name: "San Antonio Abajo - Puriscal",
            dirs: ["Puriscal", "San Antonio Abajo"],
            h: {
                semana: [["05:15", "17:25"], ["05:35", "17:45"]],
                sabado: [["---"], ["---"]],
                domingo:[["---"], ["---"]]
            }
        },
        sanjose: {
            name: "San José - Puriscal",
            dirs: ["San José", "Puriscal"],
            h: {
                semana: [
                    ["05:15", "06:00", "06:40", "07:20", "08:00", "08:40", "09:20", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:20", "15:40", "16:00", "16:15", "16:30", "16:45", "17:00", "17:20", "17:40", "18:00", "18:20", "18:40", "19:00", "19:20", "19:40", "20:30", "20:55", "21:15", "21:45", "22:30"],
                    ["03:35", "03:47", "03:59", "04:10", "04:20", "04:30", "04:40", "04:50", "05:00", "05:10", "05:20", "05:30", "05:40", "05:50", "06:00", "06:12", "06:24", "06:36", "06:48", "07:00", "07:15", "07:30", "07:45", "08:00", "08:15", "08:30", "08:45", "09:00", "09:25", "09:50", "10:15", "10:40", "11:00", "11:20", "11:40", "12:00", "12:30", "13:00", "13:30", "14:00", "14:40", "15:20", "16:00", "16:40", "17:20", "18:00", "18:40", "19:20", "20:00"]
                ],
                sabado: [             
                    ["05:25", "06:00", "06:40", "07:20", "08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30", "21:45", "22:30"],              
                    ["03:45", "04:00", "04:20", "04:40", "05:00", "05:20", "05:40", "06:00", "06:20", "06:40", "07:00", "07:20", "07:40", "08:00", "08:20", "08:40", "09:00", "09:30", "10:00", "10:20", "10:40", "11:00", "11:20", "11:40", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "20:00"]
                ],
                domingo: [
                    ["05:30", "06:15", "07:00", "07:45", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:45", "20:30"],
                    ["04:00", "04:30", "05:00", "05:30", "06:00", "06:30", "07:00", "07:30", "08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "19:00", "20:00"]
                ]
            }
        },

    };

    let currentRouteKey = null;
    let currentDirIdx = null;
    let timerInterval = null;

    function navigateToRoute(key) {
        currentRouteKey = key;
        history.pushState({step: 2, route: key}, "");
        showStep(2);
    }

    function navigateToDirection(idx) {
        currentDirIdx = idx;
        history.pushState({step: 3, route: currentRouteKey, dir: idx}, "");
        showStep(3);
        updateUI();
    }

    window.onpopstate = function(event) {
        if (event.state && event.state.step) {
            if (event.state.step === 2) {
                currentRouteKey = event.state.route;
                showStep(2);
            } else if (event.state.step === 3) {
                currentRouteKey = event.state.route;
                currentDirIdx = event.state.dir;
                showStep(3);
            }
        } else {
            showStep(1);
        }
    };

    function showStep(step) {
        document.getElementById('step1').classList.toggle('hidden', step !== 1);
        document.getElementById('step2').classList.toggle('hidden', step !== 2);
        document.getElementById('step3').classList.toggle('hidden', step !== 3);
        
        if (step === 2 && currentRouteKey) {
            document.getElementById('routeTitleDisplay').innerText = data[currentRouteKey].name;
            document.getElementById('dirName0').innerText = "Salida de " + data[currentRouteKey].dirs[0];
            document.getElementById('dirName1').innerText = "Salida de " + data[currentRouteKey].dirs[1];
        }
        
        if (step !== 3) clearInterval(timerInterval);
        else timerInterval = setInterval(updateUI, 1000);
    }

    function updateUI() {
        const now = new Date();
        const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        const day = now.getDay();
        let type = (day === 6) ? "sabado" : (day === 0 ? "domingo" : "semana");
        let dayTxt = (day === 6) ? "SÁBADO" : (day === 0 ? "DOMINGO" : "LUNES A VIERNES");

        const schedule = data[currentRouteKey].h[type][currentDirIdx];

        document.getElementById('currTime').innerText = formatAMPM(currentTimeStr);
        document.getElementById('dayLabel').innerText = dayTxt;
        document.getElementById('originDisplay').innerText = "Desde " + data[currentRouteKey].dirs[currentDirIdx];
        document.getElementById('countdown').style.color = "var(--accent-color)";
        document.getElementById('countdown').style.fontWeight = "700";

        if (schedule[0] === "---") {
            document.getElementById('countdown').innerText = "SIN SERVICIO";
            document.getElementById('nextBus').innerText = "--:--";
            document.getElementById('prevBus').innerText = "--:--";
            document.getElementById('otherTimes').innerText = "No hay buses programados para hoy.";
            return;
        }

        let nextIdx = schedule.findIndex(t => t > currentTimeStr);

        if (nextIdx !== -1) {
            const nextTime = schedule[nextIdx];
            document.getElementById('nextBus').innerText = formatAMPM(nextTime);
            document.getElementById('prevBus').innerText = nextIdx > 0 ? formatAMPM(schedule[nextIdx-1]) : "--:--";
            
            const [nh, nm] = nextTime.split(':');
            const target = new Date(); target.setHours(nh, nm, 0);
            const diffMs = target - now;
            const totalSeg = Math.floor(diffMs / 1000);
            const h = Math.floor(totalSeg / 3600);
            const m = Math.floor((totalSeg % 3600) / 60);
            const s = totalSeg % 60;

            document.getElementById('countdown').innerText = h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
            const others = schedule.slice(nextIdx + 1);
            document.getElementById('otherTimes').innerText = others.length > 0 ? others.map(formatAMPM).join(' • ') : "Último bus del día.";
        } else {
            document.getElementById('countdown').innerText = "FIN DEL SERVICIO POR HOY";
            document.getElementById('countdown').style.color = "#ff4d4d"; 
            document.getElementById('countdown').style.fontWeight = "400";
            
            document.getElementById('prevBus').innerText = formatAMPM(schedule[schedule.length-1]);
            document.getElementById('otherTimes').innerText = "No hay más buses por hoy.";

            let mañanaIdx = (day + 1) % 7;
            let tipoMañana = (mañanaIdx === 6) ? "sabado" : (mañanaIdx === 0 ? "domingo" : "semana");
            const horarioMañana = data[currentRouteKey].h[tipoMañana][currentDirIdx];
            
            if (horarioMañana && horarioMañana[0] !== "---") {
                document.getElementById('nextBus').innerHTML = `<span style="font-size:10px; display:block;">(mañana)</span>${formatAMPM(horarioMañana[0])}`;
            } else {
                document.getElementById('nextBus').innerText = "--:--";
            }
        }
    }

    function formatAMPM(time) {
        if(time === "---") return "--:--";
        let [h, m] = time.split(':');
        h = parseInt(h);
        const ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        return `${h}:${m}${ampm}`;
    }
</script>
</body>
</html>
